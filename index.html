<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#07131c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jadoo OM">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Jadoo OM Soundboard</title>
<style>
:root{--bg:#041018;--panel:#0a202c;--cyan:#66f7ff;--yellow:#ffe66c;--red:#ff6978;--text:#effdff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg)}
body{min-height:100svh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 10%,#1d5060 0,#0a222d 30%,#041018 72%)}
.console{width:min(520px,100%);padding:22px;border:1px solid #2e7180;border-radius:32px;background:linear-gradient(155deg,#102f3d,#06151e);box-shadow:0 25px 80px #000b,inset 0 0 35px #69f7ff16}
header{text-align:center;margin-bottom:20px}.eyebrow{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:#a7e9ef}.title{font-weight:950;font-size:clamp(1.7rem,8vw,2.9rem);letter-spacing:.1em;margin:5px 0;text-shadow:0 0 20px #65f7ff88}.status{min-height:1.4em;color:#a5cbd2;font-size:.9rem}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:17px}
button{border:0;appearance:none;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;color:#06202a;font-weight:950;letter-spacing:.08em;font-size:1.08rem;min-height:125px;border-radius:50%;background:radial-gradient(circle at 34% 28%,#efffff,var(--cyan) 34%,#24a9bd 77%);box-shadow:0 10px 0 #173c47,0 17px 25px #0008,inset 0 0 0 7px #ffffff55;transition:transform .08s,box-shadow .08s}
button:active,button.playing{transform:translateY(8px);box-shadow:0 2px 0 #173c47,0 8px 14px #0008,inset 0 0 0 7px #fff9}
.num{display:block;font-size:.7rem;opacity:.55;margin-bottom:3px}.wide{grid-column:1/-1;border-radius:22px;min-height:72px}.all{background:linear-gradient(#f4ffb0,var(--yellow))}.stop{background:linear-gradient(#ffd4d9,var(--red));min-height:62px}.hint{text-align:center;margin-top:17px;color:#7fa6af;font-size:.77rem;line-height:1.45}.install{display:none;margin:0 0 16px;width:100%;border-radius:16px;min-height:50px;background:#b9ffcf;box-shadow:none}.install.show{display:block}
@media(max-width:380px){.console{padding:17px}.grid{gap:13px}button{min-height:108px}}
</style>
</head>
<body>
<main class="console">
<header><div class="eyebrow">Signal Console</div><div class="title">OM · OM · OM</div><div class="status" id="status">Bereit</div></header>
<button class="install" id="install">APP INSTALLIEREN</button>
<section class="grid">
<button data-key="om1"><span class="num">01</span>OM</button>
<button data-key="om2"><span class="num">02</span>OM</button>
<button data-key="om3"><span class="num">03</span>OM</button>
<button data-key="om4"><span class="num">04</span>OM</button>
<button class="wide all" data-key="complete">▶ KOMPLETTE SEQUENZ</button>
<button class="wide stop" id="stop">■ STOP</button>
</section>
<div class="hint">iPhone: Safari → Teilen → „Zum Home-Bildschirm“<br>Android: Menü → „App installieren“</div>
</main>
<script>
const files={om1:'audio/om1.mp3',om2:'audio/om2.mp3',om3:'audio/om3.mp3',om4:'audio/om4.mp3',complete:'audio/complete.mp3'};
const sounds={}; let active=null, activeButton=null;
const status=document.getElementById('status');
for(const [key,src] of Object.entries(files)){const a=new Audio(src);a.preload='auto';sounds[key]=a}
function stop(){if(active){active.pause();try{active.currentTime=0}catch(e){}}if(activeButton)activeButton.classList.remove('playing');active=null;activeButton=null;status.textContent='Bereit'}
for(const btn of document.querySelectorAll('[data-key]')){btn.addEventListener('click',async()=>{stop();const key=btn.dataset.key;const audio=sounds[key];active=audio;activeButton=btn;btn.classList.add('playing');status.textContent=key==='complete'?'Komplette Sequenz läuft …':`OM ${key.slice(-1)} läuft …`;audio.onended=stop;audio.onerror=()=>{status.textContent='Audio konnte nicht geladen werden';btn.classList.remove('playing')};try{audio.currentTime=0;await audio.play()}catch(e){status.textContent='Bitte Lautstärke prüfen und erneut tippen';btn.classList.remove('playing')}})}
document.getElementById('stop').addEventListener('click',stop);
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
let deferredPrompt;const installBtn=document.getElementById('install');window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;installBtn.classList.add('show')});installBtn.addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;installBtn.classList.remove('show')});
</script>
</body>
</html>
