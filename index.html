<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jadoo OM">
  <title>Jadoo OM Soundboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #0f2138;
      --line: rgba(255,255,255,.12);
      --text: #f8fbff;
      --muted: #9db2c8;
      --glow: #5de1ff;
      --accent: #67f0c2;
      --danger: #ff6e7d;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at top, #173c61 0, var(--bg) 46%); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; }
    body { min-height: 100dvh; display: grid; place-items: center; padding: max(22px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom)); color: var(--text); }
    .app { width: min(100%, 520px); }
    .panel { background: rgba(8, 25, 43, .82); border: 1px solid var(--line); border-radius: 30px; padding: 24px; box-shadow: 0 24px 80px rgba(0,0,0,.42), inset 0 1px rgba(255,255,255,.08); backdrop-filter: blur(18px); }
    .eyebrow { text-align: center; color: var(--accent); font-weight: 800; letter-spacing: .18em; font-size: 12px; }
    h1 { margin: 8px 0 4px; text-align: center; font-size: clamp(30px, 9vw, 44px); }
    .sub { margin: 0 0 22px; text-align: center; color: var(--muted); line-height: 1.45; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    button {
      border: 1px solid rgba(255,255,255,.16);
      min-height: 104px;
      border-radius: 24px;
      background: linear-gradient(145deg, #183d62, #0b223a);
      color: white;
      font: inherit;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 10px 25px rgba(0,0,0,.28), inset 0 1px rgba(255,255,255,.12);
      touch-action: manipulation;
      cursor: pointer;
      transition: transform .08s ease, filter .15s ease, box-shadow .15s ease;
    }
    button:active, button.active { transform: scale(.96); filter: brightness(1.24); box-shadow: 0 0 0 3px rgba(93,225,255,.24), 0 0 28px rgba(93,225,255,.38); }
    .wide { grid-column: 1 / -1; min-height: 82px; }
    .play-all { background: linear-gradient(145deg, #147a68, #0b3a43); }
    .stop { background: linear-gradient(145deg, #8b3146, #431725); min-height: 68px; color: #fff; }
    .status { min-height: 24px; margin: 18px 0 0; text-align: center; color: var(--muted); font-weight: 650; }
    .hint { margin: 14px 8px 0; text-align: center; font-size: 13px; color: #7890a8; line-height: 1.4; }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="eyebrow">SOUNDBOARD</div>
      <h1>Jadoo OM</h1>
      <p class="sub">Jeder Knopf spielt eine eigene Sequenz.</p>

      <div class="grid">
        <button type="button" data-sound="om1">OM 1</button>
        <button type="button" data-sound="om2">OM 2</button>
        <button type="button" data-sound="om3">OM 3</button>
        <button type="button" data-sound="om4">OM 4</button>
        <button type="button" class="wide play-all" data-sound="complete">▶ Komplette Sequenz</button>
        <button type="button" class="wide stop" id="stop">■ Stop</button>
      </div>

      <div class="status" id="status">Bereit</div>
      <p class="hint">Beim ersten Start einmal eine Taste antippen. Medienlautstärke am iPhone hochstellen.</p>
    </section>
  </main>

    };

    const labels = {
      om1: "OM 1",
      om2: "OM 2",
      om3: "OM 3",
      om4: "OM 4",
      complete: "Komplette Sequenz"
    };

    const status = document.getElementById("status");
    let currentAudio = null;
    let currentButton = null;

    function stopCurrent(message = "Gestoppt") {
      if (currentAudio) {
        currentAudio.pause();
        try { currentAudio.currentTime = 0; } catch (_) {}
        currentAudio = null;
      }
      if (currentButton) {
        currentButton.classList.remove("active");
        currentButton = null;
      }
      status.textContent = message;
    }

    async function playSound(key, button) {
      stopCurrent("Lädt …");

      const audio = new Audio(sources[key]);
      audio.preload = "auto";
      audio.playsInline = true;
      currentAudio = audio;
      currentButton = button;
      button.classList.add("active");

      audio.addEventListener("ended", () => {
        if (currentAudio === audio) stopCurrent("Bereit");
      });

      audio.addEventListener("error", () => {
        if (currentAudio === audio) stopCurrent("Audio konnte nicht abgespielt werden");
      });

      try {
        await audio.play();
        status.textContent = labels[key] + " läuft";
        if (navigator.vibrate) navigator.vibrate(20);
      } catch (err) {
        stopCurrent("Bitte erneut tippen und Lautstärke prüfen");
        console.error(err);
      }
    }

    document.querySelectorAll("[data-sound]").forEach((button) => {
      button.addEventListener("click", () => playSound(button.dataset.sound, button));
    });

    document.getElementById("stop").addEventListener("click", () => stopCurrent());
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopCurrent("Pausiert");
    });
  </script>
